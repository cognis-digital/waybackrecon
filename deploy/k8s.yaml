apiVersion: apps/v1
kind: Deployment
metadata: { name: waybackrecon, labels: { app: waybackrecon } }
spec:
  replicas: 1
  selector: { matchLabels: { app: waybackrecon } }
  template:
    metadata: { labels: { app: waybackrecon } }
    spec:
      containers:
        - name: waybackrecon
          image: ghcr.io/cognis-digital/waybackrecon:latest
          ports: [{ containerPort: 8000 }]
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits: { cpu: "500m", memory: "256Mi" }
---
apiVersion: v1
kind: Service
metadata: { name: waybackrecon }
spec:
  selector: { app: waybackrecon }
  ports: [{ port: 80, targetPort: 8000 }]
